      routeCLOUD_CORTEX: "No consumption mechanics, static loot tables"
    hazards: ["acid_data_pool", "consumption_swarm", "hoarder_guardian"]
    nativeEntities: ["Consumer_Script", "Devourer_Daemon", "Hoarder_AI", "Gluttony_Worm"]
